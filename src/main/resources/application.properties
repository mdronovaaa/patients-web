spring.h2.console.enabled=true
spring.datasource.url=jdbc:h2:file:./data/patients_db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
